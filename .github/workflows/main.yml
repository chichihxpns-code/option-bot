name: Get_Option_5MA_Daily

on:
  workflow_dispatch:
  schedule:
    - cron: '50 5 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install FinMind pandas tqdm 
      - name: Run script
        run: python run_ma.py

