name: Get Options Support Resistance

on:
  workflow_dispatch: # 允許手動執行
  schedule:
    # 每天台灣時間下午 14:30 執行一次 (收盤後籌碼更新)
    # UTC 時間 06:30 = 台灣時間 14:30
    - cron: '30 6 * * *'

jobs:
  scrape-wantgoo:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas lxml bs4

    - name: Run WantGoo Scraper
      run: python run_wantgoo.py
